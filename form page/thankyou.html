<!DOCTYPE html>
<html>
<head>
<title>Thank You</title>

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f6f8;
font-family:Arial;
}

.thank-box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

h1{
color:#005aa7;
}

p{
margin-top:10px;
}

@media(max-width:480px){

.thank-box{
padding:25px;
}

h1{
font-size:22px;
}

}

</style>

</head>

<body>

<div class="thank-box">

<h1>Thank You!</h1>

<p>Your form has been successfully submitted.</p>

</div>

</body>
</html>
